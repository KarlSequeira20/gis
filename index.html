<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Projects</title>
    <script async
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBm5-nh9LnTqHyalVbTn-0k6GCG-zmXYiE&libraries=places&v=weekly&map_ids=5368bd2f628ed265d8a878ff"></script>
    <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Upload Panel -->
    <div class="upload-panel" id="uploadPanel">
        <div class="upload-content">
            <h2>📊 India Deals Map</h2>
            <p>Loading <strong>GIS (3).xlsx</strong> automatically…</p>
            <div id="uploadStatus">
                <p class="loading">⏳ Fetching file…</p>
            </div>

            <!-- Hidden by default; shown only if auto-load fails -->
            <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" style="display:none;" />
            <button onclick="processFile()" id="uploadBtn" disabled style="display:none;">Process File</button>
        </div>
    </div>

    <!-- Control Panel -->
    <div class="control-panel" id="controlPanel" style="display: none;">
        <div class="panel-header">
            <h3>Active Deals</h3>
            <div style="display: flex; gap: 10px; align-items: center;">
                <a href="info.html" class="directory-link" title="View Full Directory">📋 Directory</a>
                <button onclick="resetToIndia()" class="reset-btn">Reset to India</button>
            </div>
        </div>

        <div class="search-box">
            <input type="text" id="pincodeSearch" placeholder="Search Pincode..."
                onkeypress="if(event.key === 'Enter') searchPincode()">
            <button onclick="searchPincode()">🔍</button>
        </div>

        <div class="stats-grid" id="statsGrid"></div>
        <div class="filters">
            <h4>Filters</h4>
            <div class="filter-group">
                <select id="stateFilter" onchange="handleStateFilterChange()">
                    <option value="">All States</option>
                </select>
                <select id="pincodeFilter" onchange="applyFilters()">
                    <option value="">All Pincodes</option>
                </select>
            </div>
            <select id="sourceFilter" onchange="applyFilters()">
                <option value="">All Sources</option>
            </select>
            <select id="propertyFilter" onchange="applyFilters()">
                <option value="">All Property Types</option>
            </select>
            <div id="geofenceStatus"
                style="margin-top: 15px; font-size: 10px; color: #94a3b8; text-align: center; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 8px;">
                🔍 Checking Geofencing Layer...
            </div>
            <div style="margin-top: 10px; text-align: center;">
                <a href="#" onclick="clearGeocodeCache(); return false;"
                    style="color: #64748b; font-size: 11px; text-decoration: none; border-bottom: 1px dashed #475569;">⚠️
                    Reset Geocode Cache</a>
            </div>
        </div>
    </div>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Info Panel -->
    <div class="info-panel" id="infoPanel">
        <button class="close-btn" onclick="closeInfoPanel()">×</button>
        <div id="infoPanelContent"></div>
    </div>

    <!-- Legend -->
    <div class="legend" id="legend" style="display: none;">
        <h4>Density</h4>
        <div class="legend-item">
            <span class="legend-color" style="background: #1a1a2e;"></span>
            <span>High (50+)</span>
        </div>
        <div class="legend-item">
            <span class="legend-color" style="background: #16213e;"></span>
            <span>Medium (20-49)</span>
        </div>
        <div class="legend-item">
            <span class="legend-color" style="background: #0f3460;"></span>
            <span>Low (10-19)</span>
        </div>
        <div class="legend-item">
            <span class="legend-color" style="background: #533483;"></span>
            <span>Very Low (1-9)</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
