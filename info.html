<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pincode Directory - India Deals Map</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            overflow-y: auto;
        }

        .info-container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 20px;
            z-index: 10;
            position: relative;
        }

        .info-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .info-header h1 {
            font-size: 36px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #818cf8;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 30px;
            transition: transform 0.2s;
        }

        .back-link:hover {
            transform: translateX(-5px);
            color: #a5b4fc;
        }

        .directory-search {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 24px;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .search-large {
            display: flex;
            gap: 15px;
        }

        .search-large input {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 30px;
            border-radius: 16px;
            color: white;
            font-size: 18px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }

        .search-large input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .results-container {
            display: none;
        }

        .lead-list {
            display: grid;
            gap: 12px;
            margin-top: 30px;
        }

        .lead-card {
            background: rgba(30, 41, 59, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px 25px;
            border-radius: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            align-items: center;
            transition: all 0.2s;
        }

        .lead-card:hover {
            background: rgba(30, 41, 59, 0.5);
            border-color: rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
        }

        .lead-name {
            font-weight: 700;
            color: #f8fafc;
            font-size: 16px;
        }

        .lead-source {
            font-size: 13px;
            color: #94a3b8;
        }

        .lead-status {
            text-align: right;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-badge.default {
            background: rgba(99, 102, 241, 0.1);
            color: #818cf8;
        }

        .no-results {
            text-align: center;
            padding: 100px 0;
            color: #475569;
        }

        .no-results h2 {
            margin-bottom: 10px;
            color: #64748b;
        }

        .pincode-summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
    </style>
</head>

<body>

    <div class="info-container">
        <a href="index.html" class="back-link">← Back to Interactive Map</a>

        <div class="info-header">
            <h1>Pincode Lead Explorer</h1>
            <p style="color: #94a3b8;">Search any pincode to view the complete directory of deals and names.</p>
        </div>

        <div class="directory-search">
            <div class="search-large">
                <input type="text" id="directorySearch" placeholder="Enter Pincode (e.g. 400001)..."
                    onkeypress="if(event.key === 'Enter') performDirectorySearch()">
                <button onclick="performDirectorySearch()"
                    style="padding: 0 40px; border-radius:16px; background: linear-gradient(135deg, #6366f1, #a855f7); color:white; border:none; font-weight:700; cursor:pointer;">Search</button>
            </div>
        </div>

        <div id="loadingState" style="text-align:center; padding: 40px; display:none;">
            <p style="color:#6366f1;">⏳ Loading Database...</p>
        </div>

        <div class="results-container" id="resultsContainer">
            <div class="pincode-summary" id="pincodeSummary"></div>

            <h3 style="margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px;">Lead
                Directory</h3>
            <div class="lead-list" id="leadList"></div>
        </div>

        <div id="noResults" class="no-results">
            <h2>Ready to Explore</h2>
            <p>Enter a pincode above to deep-dive into regional data.</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="info.js"></script>
</body>

</html>
